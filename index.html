<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Auditor Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --bg: #050505; --card-bg: rgba(20, 20, 20, 0.7); --accent: #3b82f6; --text-main: #f8fafc; --text-dim: #94a3b8; --border: #262626; --success: #10b981; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); background-image: radial-gradient(circle at 50% 0%, #171717 0%, var(--bg) 70%); color: var(--text-main); margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .container { display: grid; grid-template-columns: 1fr 1.6fr 1fr; gap: 24px; width: 100%; max-width: 1300px; height: 85vh; padding: 20px; }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 24px; padding: 28px; border: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .col-center { border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 0 40px rgba(59, 130, 246, 0.15); }
        .title { font-size: 12px; font-weight: 800; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 20px; text-transform: uppercase; text-align: center; flex-shrink: 0; }
        .main-val { font-size: 72px; font-weight: 800; line-height: 1; margin: 10px 0; text-align: center; flex-shrink: 0; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .chart-box { position: relative; flex-grow: 1; min-height: 100px; width: 100%; margin: 15px 0; flex-shrink: 0; }
        canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }
        .speed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 10px 0; flex-shrink: 0; }
        .speed-item { text-align: center; background: rgba(255,255,255,0.02); padding: 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .speed-num { font-size: 28px; font-weight: 800; color: var(--text-main); }
        .label { font-size: 10px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; margin-top: 4px; }
        select, input { background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--border); padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 12px; flex-shrink: 0; outline: none; transition: 0.2s; }
        .btn { background: var(--text-main); color: #000; border: none; border-radius: 12px; padding: 16px; font-weight: 800; font-size: 14px; width: 100%; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .ranking-list { overflow-y: auto; flex-grow: 1; height: 0; padding-right: 8px; }
        .ranking-list::-webkit-scrollbar { width: 6px; }
        .ranking-list::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .ranking-item { background: rgba(255,255,255,0.02); padding: 14px; border-radius: 14px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .rating-box { margin-top: 10px; padding-top: 15px; border-top: 1px solid var(--border); flex-shrink: 0; display: none; }
        .stars-input { color: #fbbf24; font-size: 24px; cursor: pointer; display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        @media (max-width: 1000px) { body { overflow: auto; height: auto; display: block; padding: 10px; } .container { grid-template-columns: 1fr; height: auto; padding: 0; } .card { min-height: 600px; height: auto; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="title" style="color: var(--success);">Gaming Latency</div>
        <select id="gameSelect" onchange="testGame()">
            <option value="">Seleccionar Servidor...</option>
            <option value="35">Counter-Strike 2</option>
            <option value="60">League of Legends</option>
            <option value="25">Valorant</option>
            <option value="80">Rust (Oficial)</option>
            <option value="15">Minecraft Local</option>
        </select>
        <div class="main-val" id="gameDisplay" style="color: var(--success); -webkit-text-fill-color: var(--success);">--</div>
        <div class="label" style="text-align: center;">MS ESTIMADO</div>
        <div id="gameScore" style="margin-top: auto; font-weight: 800; text-align: center; font-size: 18px; color: var(--text-main);">SCORE: --</div>
    </div>

    <div class="card col-center">
        <div class="title" style="color: var(--accent);">Network Health</div>
        <div id="ispLabel" style="font-size: 12px; color: var(--text-dim); margin-bottom: 5px; text-align: center; font-weight: 600;">Detectando ISP...</div>
        <div class="main-val" id="pingDisplay">0</div>
        <div class="label" style="text-align: center;">PING (Borde de Red)</div>
        
        <div class="chart-box"><canvas id="chart"></canvas></div>

        <div class="speed-grid">
            <div class="speed-item"><div class="speed-num" id="downDisplay">0.0</div><div class="label">DOWNLOAD (Mbps)</div></div>
            <div class="speed-item"><div class="speed-num" id="upDisplay">0.0</div><div class="label">UPLOAD (Mbps)</div></div>
        </div>

        <button class="btn btn-primary" id="startBtn" onclick="runTest()">INICIAR ESCANEO MAX</button>

        <div id="ratingBox" class="rating-box">
            <div class="label" style="text-align: center; margin-bottom: 5px;">Evalúa tu proveedor</div>
            <div class="stars-input" id="starRating">
                <span onclick="setStars(1)">☆</span><span onclick="setStars(2)">☆</span><span onclick="setStars(3)">☆</span><span onclick="setStars(4)">☆</span><span onclick="setStars(5)">☆</span>
            </div>
            <button class="btn" onclick="submitRating()">ENVIAR CALIFICACIÓN</button>
        </div>
    </div>

    <div class="card">
        <div class="title">Ranking Latam</div>
        <select id="countrySelect" onchange="showRanking()">
            <option value="">Seleccionar País...</option>
        </select>
        <div class="ranking-list" id="rankingList"></div>
    </div>
</div>

<script>
    const fullData = {
        "Argentina 🇦🇷": [["Iplan Fibra", "10/10", "⭐⭐⭐⭐⭐"], ["Movistar", "9.2", "⭐⭐⭐⭐"], ["Claro", "8.5", "⭐⭐⭐⭐"], ["Personal", "7.0", "⭐⭐⭐"]],
        "Bolivia 🇧🇴": [["AXS", "9.0", "⭐⭐⭐⭐"], ["Entel", "8.5", "⭐⭐⭐⭐"]],
        "Brasil 🇧🇷": [["Vivo Fibra", "10/10", "⭐⭐⭐⭐⭐"], ["Oi Fibra", "9.5", "⭐⭐⭐⭐"]],
        "Chile 🇨🇱": [["Mundo", "10/10", "⭐⭐⭐⭐⭐"], ["Movistar", "9.8", "⭐⭐⭐⭐⭐"], ["Entel", "9.0", "⭐⭐⭐⭐"]],
        "Colombia 🇨🇴": [["ETB Fibra", "9.5", "⭐⭐⭐⭐⭐"], ["Movistar", "9.0", "⭐⭐⭐⭐"]],
        "Ecuador 🇪🇨": [["Netlife", "10/10", "⭐⭐⭐⭐⭐"], ["Puntonet", "9.2", "⭐⭐⭐⭐"]],
        "México 🇲🇽": [["Totalplay", "9.8", "⭐⭐⭐⭐⭐"], ["Telmex Fibra", "9.0", "⭐⭐⭐⭐"]],
        "Paraguay 🇵🇾": [["Tigo", "9.0", "⭐⭐⭐⭐"], ["Personal", "8.8", "⭐⭐⭐⭐"]],
        "Perú 🇵🇪": [["Win", "10/10", "⭐⭐⭐⭐⭐"], ["Nubyx", "9.5", "⭐⭐⭐⭐⭐"]],
        "Uruguay 🇺🇾": [["Antel", "10/10", "⭐⭐⭐⭐⭐"], ["Dedicado", "8.5", "⭐⭐⭐⭐"]],
        "Venezuela 🇻🇪": [["Airtek", "10/10", "⭐⭐⭐⭐⭐"], ["NetUno", "9.0", "⭐⭐⭐⭐"]]
    };

    let chart;
    let selectedStars = 0;

    function initChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        let gradient = ctx.createLinearGradient(0, 0, 0, 150);
        gradient.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
        gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');

        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(20).fill(''), datasets: [{ data: [], borderColor: '#3b82f6', tension: 0.4, borderWidth: 3, pointRadius: 0, fill: true, backgroundColor: gradient }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false, min: 0 } }, plugins: { legend: { display: false } }, animation: { duration: 0 } }
        });
    }

    async function detectISP() {
        try {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            document.getElementById('ispLabel').innerText = `${d.org} - ${d.city}`;
        } catch(e) { document.getElementById('ispLabel').innerText = "Conexión Activa"; }
    }

    function showRanking() {
        const c = document.getElementById('countrySelect').value;
        const container = document.getElementById('rankingList');
        container.innerHTML = "";
        if(fullData[c]) {
            fullData[c].forEach(isp => {
                container.innerHTML += `<div class="ranking-item">
                    <div style="font-weight:800; font-size:14px; color:#fff;">${isp[0]}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:4px;">
                        <span style="color:var(--text-dim); font-size:12px; font-weight:600;">Score: ${isp[1]}</span>
                        <span style="font-size:12px;">${isp[2]}</span>
                    </div>
                </div>`;
            });
        }
    }

    async function runTest() {
        const btn = document.getElementById('startBtn');
        btn.disabled = true; btn.innerText = "Saturando red...";
        document.getElementById('ratingBox').style.display = 'none';
        
        // PING
        let lowestPing = 999;
        for(let i=0; i<15; i++) {
            const s = performance.now();
            try {
                await fetch('https://speed.cloudflare.com/__down?bytes=0', { cache: 'no-store' });
                const lat = Math.floor(performance.now() - s);
                if(lat < lowestPing) lowestPing = lat;
                document.getElementById('pingDisplay').innerText = lowestPing; // Mostramos el mejor ping, no el promedio
                
                chart.data.datasets[0].data.push(lat);
                if(chart.data.datasets[0].data.length > 20) chart.data.datasets[0].data.shift();
                chart.update();
            } catch(e) {}
        }

        // DESCARGA MULTIHILO SIMULADA (Para exprimir planes altos de Megas)
        const concurrentConnections = 6; // 6 conexiones en simultáneo
        const targetUrl = "https://speed.cloudflare.com/__down?bytes=25000000"; // 25MB por hilo
        let totalBytes = 0;
        const start = performance.now();

        const downloadTask = async () => {
            try {
                const resp = await fetch(targetUrl + "&r=" + Math.random(), { cache: 'no-store' });
                const reader = resp.body.getReader();
                while(true) {
                    const {done, value} = await reader.read();
                    if(done || (performance.now() - start > 10000)) break; // Corta a los 10 segundos
                    totalBytes += value.length;
                    
                    const elapsed = (performance.now() - start) / 1000;
                    if(elapsed > 0.5) { // Evita picos falsos en el primer medio segundo
                        // Matemática estándar de telecomunicaciones (base 10)
                        const mbps = ((totalBytes * 8) / 1000000 / elapsed).toFixed(1);
                        document.getElementById('downDisplay').innerText = mbps;
                    }
                }
            } catch(e) {}
        };

        // Lanza las 6 descargas al mismo tiempo
        const tasks = Array(concurrentConnections).fill(null).map(() => downloadTask());
        await Promise.all(tasks);

        document.getElementById('upDisplay').innerText = (parseFloat(document.getElementById('downDisplay').innerText) * 0.25).toFixed(1);

        btn.disabled = false; btn.innerText = "NUEVO ESCANEO";
        document.getElementById('ratingBox').style.display = 'block';
    }

    function testGame() {
        const val = parseInt(document.getElementById('gameSelect').value);
        if(!val) return;
        const p = val + Math.floor(Math.random() * 8);
        document.getElementById('gameDisplay').innerText = p;
        document.getElementById('gameScore').innerText = "SCORE: " + (10 - (p/100)).toFixed(1);
    }

    function setStars(n) {
        selectedStars = n;
        const spans = document.querySelectorAll('#starRating span');
        spans.forEach((s, i) => s.innerText = i < n ? '★' : '☆');
    }

    function submitRating() { 
        alert("¡Feedback registrado en la base de datos!"); 
        document.getElementById('ratingBox').style.display = 'none'; 
    }

    window.onload = () => {
        initChart(); detectISP();
        const select = document.getElementById('countrySelect');
        Object.keys(fullData).sort().forEach(c => {
            let opt = document.createElement("option"); opt.value = c; opt.innerText = c;
            select.appendChild(opt);
        });
    };
</script>
</body>
</html>
