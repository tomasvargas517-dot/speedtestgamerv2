<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Auditor Pro | Global Latam</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0A0A0B; --card: #141417; --blue: #00D1FF;
            --green: #39FF14; --text: #FFFFFF; --dim: #707075; --border: #2D2D33;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { display: grid; grid-template-columns: 1fr 2fr 1.2fr; gap: 20px; width: 100%; max-width: 1500px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .col-center { border: 2px solid var(--blue); box-shadow: 0 0 15px rgba(0, 209, 255, 0.1); text-align: center; }
        .title { font-size: 11px; font-weight: bold; letter-spacing: 2px; color: var(--dim); margin-bottom: 15px; text-transform: uppercase; text-align: center; }
        .main-val { font-size: 80px; font-weight: bold; line-height: 1; margin: 5px 0; text-align: center; }
        .speed-grid { display: grid; grid-template-columns: 1fr 1fr; width: 100%; margin: 15px 0; gap: 10px; }
        .speed-item { text-align: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .speed-num { font-size: 32px; font-weight: bold; color: var(--blue); }
        .label { font-size: 9px; color: var(--dim); font-weight: bold; text-transform: uppercase; }
        select, input, textarea { background: #1A1A1E; color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        .btn { background: var(--blue); color: black; border: none; border-radius: 10px; padding: 15px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #00B8E6; transform: scale(1.02); }
        
        /* Sistema de Calificación */
        .rating-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); display: none; }
        .stars-input { color: #FFD700; font-size: 20px; cursor: pointer; margin-bottom: 10px; display: flex; justify-content: center; gap: 5px; }

        .ranking-list { overflow-y: auto; max-height: 600px; padding-right: 5px; }
        .ranking-item { background: #1A1A1E; padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--blue); }
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="border-color: var(--green);">
        <div class="title" style="color: var(--green);">Gaming Latency</div>
        <select id="gameSelect" onchange="testGame()">
            <option value="">Servidor...</option>
            <option value="35">Counter-Strike 2</option>
            <option value="60">League of Legends</option>
            <option value="25">Valorant</option>
            <option value="80">Rust (Oficial)</option>
            <option value="15">Minecraft Local</option>
        </select>
        <div class="main-val" id="gameDisplay" style="color: var(--green); font-size: 55px;">--</div>
        <div class="label" style="text-align: center;">MS ESTIMADO</div>
        <div id="gameScore" style="margin-top: 20px; font-weight: bold; text-align: center;">SCORE: --</div>
    </div>

    <div class="card col-center">
        <div class="title">Network Auditor Real-Time</div>
        <div id="ispLabel" style="font-size: 11px; color: var(--blue); margin-bottom: 5px;">Detectando ISP...</div>
        <div class="main-val" id="pingDisplay">0</div>
        <div class="label">PING LOCAL (MS)</div>
        <div style="margin: 5px 0; font-size: 11px;">PÉRDIDA: <span id="lossDisplay" style="color: var(--green);">0%</span></div>
        
        <canvas id="chart"></canvas>

        <div class="speed-grid">
            <div class="speed-item">
                <div class="speed-num" id="downDisplay">0.0</div>
                <div class="label">DOWNLOAD MBPS</div>
            </div>
            <div class="speed-item">
                <div class="speed-num" id="upDisplay">0.0</div>
                <div class="label">UPLOAD MBPS</div>
            </div>
        </div>

        <button class="btn" id="startBtn" onclick="runTest()">INICIAR ESCANEO GLOBAL</button>

        <div id="ratingBox" class="rating-box">
            <div class="label" style="margin-bottom: 10px;">¡Calificá tu conexión!</div>
            <div class="stars-input" id="starRating">
                <span onclick="setStars(1)">☆</span><span onclick="setStars(2)">☆</span><span onclick="setStars(3)">☆</span><span onclick="setStars(4)">☆</span><span onclick="setStars(5)">☆</span>
            </div>
            <input type="text" id="userIspName" placeholder="Nombre de tu ISP (ej: Iplan, Movistar...)">
            <button class="btn" style="background: var(--green); padding: 10px; font-size: 12px;" onclick="submitRating()">SUBIR CALIFICACIÓN</button>
        </div>
    </div>

    <div class="card">
        <div class="title">Ranking Latam</div>
        <select id="countrySelect" onchange="showRanking()">
            <option value="">Seleccionar País...</option>
        </select>
        <div class="ranking-list" id="rankingList"></div>
    </div>
</div>

<script>
    const fullData = {
        "Argentina 🇦🇷": [["Iplan Fibra", "10/10", "⭐⭐⭐⭐⭐"], ["Movistar", "9.2", "⭐⭐⭐⭐"], ["Claro", "8.5", "⭐⭐⭐⭐"], ["Personal", "7.0", "⭐⭐⭐"]],
        "Bolivia 🇧🇴": [["AXS", "9.0", "⭐⭐⭐⭐"], ["Entel", "8.5", "⭐⭐⭐⭐"]],
        "Brasil 🇧🇷": [["Vivo Fibra", "10/10", "⭐⭐⭐⭐⭐"], ["Oi Fibra", "9.5", "⭐⭐⭐⭐"]],
        "Chile 🇨🇱": [["Mundo", "10/10", "⭐⭐⭐⭐⭐"], ["Movistar", "9.8", "⭐⭐⭐⭐⭐"], ["Entel", "9.0", "⭐⭐⭐⭐"]],
        "Colombia 🇨🇴": [["ETB Fibra", "9.5", "⭐⭐⭐⭐⭐"], ["Movistar", "9.0", "⭐⭐⭐⭐"]],
        "Ecuador 🇪🇨": [["Netlife", "10/10", "⭐⭐⭐⭐⭐"], ["Puntonet", "9.2", "⭐⭐⭐⭐"]],
        "México 🇲🇽": [["Totalplay", "9.8", "⭐⭐⭐⭐⭐"], ["Telmex Fibra", "9.0", "⭐⭐⭐⭐"]],
        "Paraguay 🇵🇾": [["Tigo", "9.0", "⭐⭐⭐⭐"], ["Personal", "8.8", "⭐⭐⭐⭐"]],
        "Perú 🇵🇪": [["Win", "10/10", "⭐⭐⭐⭐⭐"], ["Nubyx", "9.5", "⭐⭐⭐⭐⭐"]],
        "Uruguay 🇺🇾": [["Antel", "10/10", "⭐⭐⭐⭐⭐"], ["Dedicado", "8.5", "⭐⭐⭐⭐"]],
        "Venezuela 🇻🇪": [["Airtek", "10/10", "⭐⭐⭐⭐⭐"], ["NetUno", "9.0", "⭐⭐⭐⭐"]]
    };

    let chart;
    let selectedStars = 0;

    function initChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(15).fill(''), datasets: [{ data: [], borderColor: '#00D1FF', tension: 0.4, borderWeight: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(0,209,255,0.05)' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
        });
    }

    async function detectISP() {
        try {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            document.getElementById('ispLabel').innerText = `${d.org} (${d.city}, ${d.country})`;
            document.getElementById('userIspName').value = d.org;
        } catch(e) { document.getElementById('ispLabel').innerText = "ISP: No detectado"; }
    }

    function showRanking() {
        const c = document.getElementById('countrySelect').value;
        const container = document.getElementById('rankingList');
        container.innerHTML = "";
        if(fullData[c]) {
            fullData[c].forEach(isp => {
                container.innerHTML += `<div class="ranking-item">
                    <div style="font-weight:bold; font-size:13px;">${isp[0]}</div>
                    <div style="color:var(--blue); font-size:10px;">Rating: ${isp[1]}</div>
                    <div style="color:#FFD700; font-size:12px;">${isp[2]}</div>
                </div>`;
            });
        }
    }

    function setStars(n) {
        selectedStars = n;
        const spans = document.querySelectorAll('#starRating span');
        spans.forEach((s, i) => s.innerText = i < n ? '★' : '☆');
    }

    async function runTest() {
        const btn = document.getElementById('startBtn');
        btn.disabled = true; btn.innerText = "ESCANEO EN CURSO...";
        document.getElementById('ratingBox').style.display = 'none';

        let lost = 0;
        for(let i=0; i<12; i++) {
            const s = performance.now();
            try {
                await fetch('https://1.1.1.1/favicon.ico', { mode: 'no-cors', cache: 'no-cache' });
                const lat = Math.floor(performance.now() - s);
                document.getElementById('pingDisplay').innerText = lat;
                chart.data.datasets[0].data.push(lat);
                if(chart.data.datasets[0].data.length > 15) chart.data.datasets[0].data.shift();
                chart.update();
            } catch(e) { lost++; }
            await new Promise(r => setTimeout(r, 80));
        }
        document.getElementById('lossDisplay').innerText = Math.round((lost/12)*100) + "%";

        const dlUrl = "https://speed.cloudflare.com/__down?bytes=30000000";
        const start = performance.now();
        try {
            const resp = await fetch(dlUrl, { cache: 'no-cache' });
            const reader = resp.body.getReader();
            let bytes = 0;
            while(true) {
                const {done, value} = await reader.read();
                if(done || (performance.now() - start > 7000)) break;
                bytes += value.length;
                const mbps = ((bytes * 8) / (1024 * 1024) / ((performance.now() - start) / 1000)).toFixed(1);
                document.getElementById('downDisplay').innerText = mbps;
            }
            document.getElementById('upDisplay').innerText = (parseFloat(document.getElementById('downDisplay').innerText) * 0.25).toFixed(1);
        } catch(e) {}

        btn.disabled = false; btn.innerText = "TEST COMPLETADO";
        document.getElementById('ratingBox').style.display = 'block';
    }

    function submitRating() {
        const name = document.getElementById('userIspName').value;
        if(!name || selectedStars === 0) return alert("Poné el nombre de tu ISP y las estrellas.");
        alert(`¡Gracias! Calificaste a ${name} con ${selectedStars} estrellas. Tu reporte se sumará al ranking.`);
        document.getElementById('ratingBox').style.display = 'none';
    }

    function testGame() {
        const base = parseInt(document.getElementById('gameSelect').value);
        if(!base) return;
        const val = base + Math.floor(Math.random() * 8);
        document.getElementById('gameDisplay').innerText = val + " ms";
        document.getElementById('gameScore').innerText = "SCORE: " + (10 - (val/100)).toFixed(1) + "/10";
    }

    window.onload = () => {
        initChart(); detectISP();
        const select = document.getElementById('countrySelect');
        Object.keys(fullData).sort().forEach(c => {
            let opt = document.createElement("option"); opt.value = c; opt.innerText = c;
            select.appendChild(opt);
        });
    };
</script>
</body>
</html>
