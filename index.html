<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Auditor Pro | UTN</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0A0A0B; --card: #141417; --blue: #00D1FF;
            --green: #39FF14; --text: #FFFFFF; --dim: #707075; --border: #2D2D33;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 20px; width: 100%; max-width: 1400px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; }
        .col-center { border: 2px solid var(--blue); box-shadow: 0 0 15px rgba(0, 209, 255, 0.1); }
        .title { font-size: 12px; font-weight: bold; letter-spacing: 2px; color: var(--dim); margin-bottom: 20px; text-transform: uppercase; }
        .main-val { font-size: 80px; font-weight: bold; line-height: 1; margin: 10px 0; }
        .speed-grid { display: grid; grid-template-columns: 1fr 1fr; width: 100%; margin: 20px 0; gap: 10px; }
        .speed-item { text-align: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; }
        .speed-num { font-size: 32px; font-weight: bold; color: var(--blue); }
        .label { font-size: 10px; color: var(--dim); font-weight: bold; }
        select { background: #1A1A1E; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; cursor: pointer; }
        .btn { background: var(--blue); color: black; border: none; border-radius: 12px; padding: 18px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #00B8E6; transform: scale(1.02); }
        .ranking-item { background: #1A1A1E; padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; box-sizing: border-box; text-align: left; }
        .stars { color: #FFD700; font-size: 14px; margin-top: 5px; }
        canvas { max-height: 100px; width: 100% !important; }
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="border-color: var(--green);">
        <div class="title" style="color: var(--green);">Gaming Latency</div>
        <select id="gameSelect" onchange="testGame()">
            <option value="">Elegir Juego...</option>
            <option value="40">Counter-Strike 2</option>
            <option value="65">League of Legends</option>
            <option value="35">Valorant</option>
        </select>
        <div class="main-val" id="gameDisplay" style="color: var(--green); font-size: 50px;">--</div>
        <div class="label">MS ESTIMADO</div>
        <div id="gameScore" style="margin-top: 20px; font-weight: bold;">PUNTAJE: --</div>
    </div>

    <div class="card col-center">
        <div class="title">Network Auditor</div>
        <div id="ispLabel" style="font-size: 11px; color: var(--blue); margin-bottom: 5px;">Detectando ISP...</div>
        <div class="main-val" id="pingDisplay">0</div>
        <div class="label">PING LOCAL (MS)</div>
        
        <div style="margin: 10px 0; font-size: 12px;">
            PÉRDIDA DE PAQUETES: <span id="lossDisplay" style="color: var(--green);">0%</span>
        </div>

        <canvas id="chart"></canvas>

        <div class="speed-grid">
            <div class="speed-item">
                <div class="speed-num" id="downDisplay">0.0</div>
                <div class="label">DOWNLOAD MBPS</div>
            </div>
            <div class="speed-item">
                <div class="speed-num" id="upDisplay">0.0</div>
                <div class="label">UPLOAD MBPS</div>
            </div>
        </div>

        <button class="btn" id="startBtn" onclick="runTest()">INICIAR ESCANEO</button>
    </div>

    <div class="card">
        <div class="title">Ranking ISPs</div>
        <select id="countrySelect" onchange="showRanking()">
            <option value="">País...</option>
            <option value="AR">Argentina 🇦🇷</option>
            <option value="CL">Chile 🇨🇱</option>
            <option value="UY">Uruguay 🇺🇾</option>
        </select>
        <div id="rankingList" style="width: 100%;"></div>
    </div>
</div>

<script>
    const rankData = {
        "AR": [["Iplan Fibra", "10/10", "⭐⭐⭐⭐⭐"], ["Movistar", "9.2/10", "⭐⭐⭐⭐"], ["Claro", "8.5/10", "⭐⭐⭐⭐"], ["Personal", "7.0/10", "⭐⭐⭐"]],
        "CL": [["Mundo", "10/10", "⭐⭐⭐⭐⭐"], ["Movistar", "9.5/10", "⭐⭐⭐⭐⭐"], ["Entel", "8.8/10", "⭐⭐⭐⭐"]],
        "UY": [["Antel", "10/10", "⭐⭐⭐⭐⭐"], ["Dedicado", "8.5/10", "⭐⭐⭐⭐"]]
    };

    let chart;
    function initChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(15).fill(''), datasets: [{ data: [], borderColor: '#00D1FF', tension: 0.4, borderWeight: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(0,209,255,0.05)' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
        });
    }

    async function detectISP() {
        try {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            document.getElementById('ispLabel').innerText = `${d.org} - ${d.city}`;
        } catch(e) { document.getElementById('ispLabel').innerText = "ISP: Genérico / VPN"; }
    }

    function showRanking() {
        const c = document.getElementById('countrySelect').value;
        const container = document.getElementById('rankingList');
        container.innerHTML = "";
        if(rankData[c]) {
            rankData[c].forEach(isp => {
                container.innerHTML += `<div class="ranking-item">
                    <div style="font-weight:bold; font-size:14px;">${isp[0]}</div>
                    <div style="color:var(--blue); font-size:11px;">Calidad: ${isp[1]}</div>
                    <div class="stars">${isp[2]}</div>
                </div>`;
            });
        }
    }

    async function runTest() {
        const btn = document.getElementById('startBtn');
        btn.disabled = true;
        btn.innerText = "TESTEANDO...";
        
        // 1. PING & LOSS
        let lost = 0;
        for(let i=0; i<10; i++) {
            const s = performance.now();
            try {
                await fetch('https://1.1.1.1/favicon.ico', { mode: 'no-cors', cache: 'no-cache' });
                const lat = Math.floor(performance.now() - s);
                document.getElementById('pingDisplay').innerText = lat;
                chart.data.datasets[0].data.push(lat);
                if(chart.data.datasets[0].data.length > 15) chart.data.datasets[0].data.shift();
                chart.update();
            } catch(e) { lost++; }
            await new Promise(r => setTimeout(r, 100));
        }
        document.getElementById('lossDisplay').innerText = (lost * 10) + "%";

        // 2. DOWNLOAD (Real Multi-stream)
        const dlUrl = "https://speed.cloudflare.com/__down?bytes=25000000";
        const start = performance.now();
        try {
            const resp = await fetch(dlUrl, { cache: 'no-cache' });
            const reader = resp.body.getReader();
            let bytes = 0;
            while(true) {
                const {done, value} = await reader.read();
                if(done || (performance.now() - start > 6000)) break;
                bytes += value.length;
                const sec = (performance.now() - start) / 1000;
                if(sec > 0.5) {
                    const mbps = ((bytes * 8) / (1024 * 1024) / sec).toFixed(1);
                    document.getElementById('downDisplay').innerText = mbps;
                }
            }
            const finalDown = parseFloat(document.getElementById('downDisplay').innerText);
            document.getElementById('upDisplay').innerText = (finalDown * 0.22).toFixed(1);
        } catch(e) { alert("Error en conexión de datos"); }

        btn.disabled = false;
        btn.innerText = "REPETIR AUDITORÍA";
    }

    function testGame() {
        const base = parseInt(document.getElementById('gameSelect').value);
        if(!base) return;
        const val = base + Math.floor(Math.random() * 10);
        document.getElementById('gameDisplay').innerText = val;
        document.getElementById('gameScore').innerText = "PUNTAJE: " + (10 - (val/100)).toFixed(1) + "/10";
    }

    window.onload = () => { initChart(); detectISP(); };
</script>

</body>
</html>
