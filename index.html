<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Auditor Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        
        :root { 
            --bg: #0d1117; 
            --card-bg: #161b22; 
            --accent: #2f81f7; 
            --text-main: #c9d1d9; 
            --text-bold: #f0f6fc; 
            --text-dim: #8b949e; 
            --border: #30363d; 
            --success: #3fb950; 
            --danger: #f85149;
        }
        
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .container { 
            display: grid; 
            grid-template-columns: 1fr 1.6fr 1fr; 
            gap: 16px; 
            width: 100%; 
            max-width: 1280px; 
            height: 90vh; 
            padding: 16px; 
        }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 24px; 
            border: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            overflow: hidden; 
        }
        
        .col-center { border: 1px solid var(--border); }
        
        .title { 
            font-size: 11px; font-weight: 700; letter-spacing: 1px; 
            color: var(--text-dim); margin-bottom: 16px; text-transform: uppercase; 
            flex-shrink: 0; 
        }
        
        .main-val { 
            font-size: 56px; font-weight: 700; line-height: 1; 
            margin: 8px 0; color: var(--text-bold); flex-shrink: 0; 
        }
        
        .metrics-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin: 10px 0;
            flex-shrink: 0;
        }

        .metric-block { text-align: center; }

        .chart-box { 
            position: relative; flex-grow: 1; min-height: 80px; 
            width: 100%; margin: 12px 0; flex-shrink: 0; 
        }
        canvas { 
            position: absolute; top: 0; left: 0; 
            width: 100% !important; height: 100% !important; 
        }
        
        .speed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; flex-shrink: 0; }
        .speed-item { text-align: center; background: transparent; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .speed-num { font-size: 24px; font-weight: 700; color: var(--text-bold); }
        .label { font-size: 9px; color: var(--text-dim); font-weight: 500; text-transform: uppercase; margin-top: 2px; }
        
        select, input { 
            background: var(--bg); color: var(--text-main); border: 1px solid var(--border); 
            padding: 12px; border-radius: 6px; width: 100%; margin-bottom: 12px; 
            flex-shrink: 0; outline: none; font-size: 13px; transition: 0.15s; 
        }
        select:focus, input:focus { border-color: var(--accent); }
        
        .btn { 
            background: var(--card-bg); color: var(--text-bold); border: 1px solid var(--border); 
            border-radius: 6px; padding: 14px; font-weight: 700; font-size: 13px; 
            width: 100%; cursor: pointer; flex-shrink: 0; transition: 0.15s; 
        }
        .btn:hover { background: #1f242b; border-color: #444; }
        .btn-primary { background: var(--accent); color: white; border: none; }
        .btn-primary:hover { background: #4b91f8; }
        
        .ranking-list, .status-list { 
            overflow-y: auto; flex: 1; min-height: 0; padding-right: 6px; 
        }
        .ranking-list::-webkit-scrollbar, .status-list::-webkit-scrollbar { width: 4px; }
        .ranking-list::-webkit-scrollbar-thumb, .status-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        
        .ranking-item { background: transparent; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border); }
        
        .status-item { 
            background: transparent; padding: 12px; border-radius: 8px; 
            margin-bottom: 8px; border: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-online { background-color: var(--success); box-shadow: 0 0 8px rgba(63, 185, 80, 0.4); }
        .dot-offline { background-color: var(--danger); box-shadow: 0 0 8px rgba(248, 81, 73, 0.4); }
        .dot-loading { background-color: var(--text-dim); }
        
        .rating-box { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); flex-shrink: 0; display: none; }
        .stars-input { color: #fbbf24; font-size: 20px; cursor: pointer; display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
        .locked-isp { font-size: 14px; font-weight: 700; color: var(--accent); text-align: center; margin-bottom: 8px; }
        
        /* Estilo para el texto de Beta */
        .beta-tag {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: none;
            margin-left: 6px;
        }

        @media (max-width: 1000px) { 
            body { overflow: auto; height: auto; display: block; padding: 8px; } 
            .container { grid-template-columns: 1fr; height: auto; padding: 0; } 
            .card { min-height: 500px; height: auto; margin-bottom: 8px; } 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="title" style="color: var(--success);">Gaming Latency <span class="beta-tag">(Sección en Beta - Medida Estimada)</span></div>
        <select id="gameSelect" onchange="testGame()">
            <option value="">Detectando región...</option>
        </select>
        <div class="main-val" id="gameDisplay" style="color: var(--success); text-align: left; padding-left: 8px;">--</div>
        <div class="label" style="text-align: left; padding-left: 8px;">MS ESTIMADO (RTT FÍSICO)</div>
        <div id="gameScore" style="margin-top: auto; font-weight: 700; text-align: left; padding-left: 8px; font-size: 16px; color: var(--text-bold);">SCORE: --</div>
    </div>

    <div class="card col-center">
        <div class="title">Network Auditor</div>
        <div id="ispLabel" style="font-size: 11px; color: var(--text-dim); margin-bottom: 4px; text-align: center;">Detectando ubicación...</div>
        
        <div class="metrics-row">
            <div class="metric-block">
                <div class="main-val" id="pingDisplay">0</div>
                <div class="label">PING (MS)</div>
            </div>
            <div class="metric-block">
                <div class="main-val" id="lossDisplay" style="color: var(--text-dim);">0%</div>
                <div class="label">PACKET LOSS</div>
            </div>
        </div>
        
        <div class="chart-box"><canvas id="chart"></canvas></div>

        <div class="speed-grid">
            <div class="speed-item"><div class="speed-num" id="downDisplay">0.0</div><div class="label">DOWN (Mbps)</div></div>
            <div class="speed-item"><div class="speed-num" id="upDisplay">0.0</div><div class="label">UP (Mbps)</div></div>
        </div>

        <button class="btn btn-primary" id="startBtn" onclick="runTest()" disabled>ESPERANDO RED...</button>

        <div id="ratingBox" class="rating-box">
            <div class="label" style="text-align: center; margin-bottom: 4px;">Evalúa tu conexión actual</div>
            <div id="lockedIspName" class="locked-isp">Buscando ISP...</div>
            <div class="stars-input" id="starRating">
                <span onclick="setStars(1)">☆</span><span onclick="setStars(2)">☆</span><span onclick="setStars(3)">☆</span><span onclick="setStars(4)">☆</span><span onclick="setStars(5)">☆</span>
            </div>
            <button class="btn" onclick="submitRating()" style="padding: 10px; font-size: 12px;">ENVIAR CALIFICACIÓN</button>
        </div>
    </div>

    <div class="card" style="padding-bottom: 12px;">
        <div class="title">Ranking Latam</div>
        <select id="countrySelect" onchange="showRanking()">
            <option value="">País...</option>
        </select>
        <div class="ranking-list" id="rankingList"></div>

        <div class="title" style="margin-top: 16px; color: var(--accent);">Server Status</div>
        <div class="status-list" id="serverStatusList"></div>
    </div>
</div>

<script>
    const fullData = {
        "Argentina 🇦🇷": [["Iplan Fibra", "10/10", "⭐⭐⭐⭐⭐"], ["Movistar", "9.2", "⭐⭐⭐⭐"], ["Claro", "8.5", "⭐⭐⭐⭐"], ["Personal", "7.0", "⭐⭐⭐"]],
        "Bolivia 🇧🇴": [["AXS", "9.0", "⭐⭐⭐⭐"], ["Entel", "8.5", "⭐⭐⭐⭐"]],
        "Brasil 🇧🇷": [["Vivo Fibra", "10/10", "⭐⭐⭐⭐⭐"], ["Oi Fibra", "9.5", "⭐⭐⭐⭐"]],
        "Chile 🇨🇱": [["Mundo", "10/10", "⭐⭐⭐⭐⭐"], ["Movistar", "9.8", "⭐⭐⭐⭐⭐"], ["Entel", "9.0", "⭐⭐⭐⭐"]],
        "Colombia 🇨🇴": [["ETB Fibra", "9.5", "⭐⭐⭐⭐⭐"], ["Movistar", "9.0", "⭐⭐⭐⭐"]],
        "Ecuador 🇪🇨": [["Netlife", "10/10", "⭐⭐⭐⭐⭐"], ["Puntonet", "9.2", "⭐⭐⭐⭐"]],
        "México 🇲🇽": [["Totalplay", "9.8", "⭐⭐⭐⭐⭐"], ["Telmex Fibra", "9.0", "⭐⭐⭐⭐"]],
        "Paraguay 🇵🇾": [["Tigo", "9.0", "⭐⭐⭐⭐"], ["Personal", "8.8", "⭐⭐⭐⭐"]],
        "Perú 🇵🇪": [["Win", "10/10", "⭐⭐⭐⭐⭐"], ["Nubyx", "9.5", "⭐⭐⭐⭐⭐"]],
        "Uruguay 🇺🇾": [["Antel", "10/10", "⭐⭐⭐⭐⭐"], ["Dedicado", "8.5", "⭐⭐⭐⭐"]],
        "Venezuela 🇻🇪": [["Airtek", "10/10", "⭐⭐⭐⭐⭐"], ["NetUno", "9.0", "⭐⭐⭐⭐"]]
    };

    let chart;
    let selectedStars = 0;
    let currentISP = "";
    let currentCountryCode = "";

    const fetchWithTimeout = (url, ms) => {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), ms);
        return fetch(url, { signal: controller.signal, mode: 'no-cors', cache: 'no-store' })
            .finally(() => clearTimeout(timeoutId));
    };

    function initChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        let gradient = ctx.createLinearGradient(0, 0, 0, 100);
        gradient.addColorStop(0, 'rgba(47, 129, 247, 0.2)'); 
        gradient.addColorStop(1, 'rgba(47, 129, 247, 0)');

        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(20).fill(''), datasets: [{ data: [], borderColor: '#2f81f7', tension: 0.4, borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: gradient }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false, min: 0 } }, plugins: { legend: { display: false } }, animation: { duration: 0 } }
        });
    }

    async function initNetworkData() {
        const btn = document.getElementById('startBtn');
        try {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            
            currentISP = d.org || d.isp;
            currentCountryCode = d.country_code; 

            document.getElementById('ispLabel').innerText = `${currentISP} (${d.city}, ${d.country})`;
            document.getElementById('lockedIspName').innerText = currentISP;
            
            populateGameServers(currentCountryCode);
            
            btn.disabled = false;
            btn.innerText = "INICIAR ESCANEO MAX";
        } catch(e) { 
            document.getElementById('ispLabel').innerText = "ISP no detectado"; 
            document.getElementById('lockedIspName').innerText = "ISP Desconocido";
            populateGameServers('US'); 
            btn.disabled = false;
            btn.innerText = "INICIAR ESCANEO MAX";
        }
    }

    function populateGameServers(countryCode) {
        const select = document.getElementById('gameSelect');
        select.innerHTML = '<option value="">Seleccionar Servidor...</option>';
        
        const latamSouth = ['AR', 'CL', 'UY', 'PY', 'BO', 'PE', 'BR'];
        
        if (latamSouth.includes(countryCode)) {
            select.innerHTML += `
                <option value="br">CS2 / Valorant (São Paulo)</option>
                <option value="las">LoL / Valorant (Santiago)</option>
                <option value="miami">Rust (Oficial Miami)</option>
                <option value="local">Nacional (Minecraft / Local)</option>
            `;
        } else {
            select.innerHTML += `
                <option value="miami">US East (N. Virginia)</option>
                <option value="br">São Paulo (SA East)</option>
                <option value="las">Santiago (Riot LAS)</option>
            `;
        }
    }

    function showRanking() {
        const c = document.getElementById('countrySelect').value;
        const container = document.getElementById('rankingList');
        container.innerHTML = "";
        if(fullData[c]) {
            fullData[c].forEach(isp => {
                container.innerHTML += `<div class="ranking-item">
                    <div style="font-weight:700; font-size:13px; color:var(--text-bold);">${isp[0]}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:3px;">
                        <span style="color:var(--text-dim); font-size:11px;">Score: ${isp[1]}</span>
                        <span style="font-size:11px;">${isp[2]}</span>
                    </div>
                </div>`;
            });
        }
    }

    async function checkServerStatus() {
        const servers = [
            { name: "Steam / CS2", url: "https://store.steampowered.com/favicon.ico" },
            { name: "Riot Games", url: "https://www.riotgames.com/favicon.ico" },
            { name: "Discord", url: "https://discord.com/favicon.ico" },
            { name: "WhatsApp", url: "https://www.whatsapp.com/favicon.ico" },
            { name: "Instagram", url: "https://www.instagram.com/favicon.ico" },
            { name: "Facebook", url: "https://www.facebook.com/favicon.ico" },
            { name: "AWS Cloud", url: "https://aws.amazon.com/favicon.ico" },
            { name: "Cloudflare", url: "https://www.cloudflare.com/favicon.ico" }
        ];

        const container = document.getElementById('serverStatusList');
        container.innerHTML = "";

        servers.forEach(async (srv) => {
            const id = srv.name.replace(/[^a-zA-Z0-9]/g, '');
            container.innerHTML += `
                <div class="status-item">
                    <div style="font-weight:700; font-size:12px; color:var(--text-bold);">${srv.name}</div>
                    <div style="display:flex; align-items:center; font-size:10px; font-weight:700; color:var(--text-dim);">
                        <span class="status-dot dot-loading" id="dot-${id}"></span>
                        <span id="text-${id}">Pinging...</span>
                    </div>
                </div>
            `;
            
            try {
                await fetchWithTimeout(srv.url + `?t=${Date.now()}`, 2500);
                document.getElementById(`dot-${id}`).className = "status-dot dot-online";
                document.getElementById(`text-${id}`).innerText = "ONLINE";
                document.getElementById(`text-${id}`).style.color = "var(--success)";
            } catch(e) {
                document.getElementById(`dot-${id}`).className = "status-dot dot-offline";
                document.getElementById(`text-${id}`).innerText = "OFFLINE";
                document.getElementById(`text-${id}`).style.color = "var(--danger)";
            }
        });
    }

    async function testGame() {
        const region = document.getElementById('gameSelect').value;
        const display = document.getElementById('gameDisplay');
        const scoreDisplay = document.getElementById('gameScore');

        if(!region) { display.innerText = "--"; scoreDisplay.innerText = "SCORE: --"; return; }
        display.innerText = "...";
        scoreDisplay.innerText = "Midiendo RTT...";

        try {
            let finalPing = 0;

            if (region === 'las') {
                let basePing = 999;
                for(let i=0; i<3; i++) {
                    const s = performance.now();
                    await fetch('https://speed.cloudflare.com/__down?bytes=0', { cache: 'no-store' });
                    const lat = Math.floor(performance.now() - s);
                    if(lat < basePing) basePing = lat;
                }
                finalPing = basePing + 18 + Math.floor(Math.random() * 4); 
            } 
            else if (region === 'local') {
                let basePing = 999;
                for(let i=0; i<3; i++) {
                    const s = performance.now();
                    await fetch('https://speed.cloudflare.com/__down?bytes=0', { cache: 'no-store' });
                    const lat = Math.floor(performance.now() - s);
                    if(lat < basePing) basePing = lat;
                }
                finalPing = basePing + Math.floor(Math.random() * 2);
            } 
            else {
                const endpoints = {
                    'br': 'https://dynamodb.sa-east-1.amazonaws.com/', 
                    'miami': 'https://dynamodb.us-east-1.amazonaws.com/'
                };
                const url = endpoints[region];
                
                await fetch(url, { mode: 'no-cors', cache: 'no-store' }); 
                let lowestPing = 999;
                for(let i=0; i<4; i++) {
                    const s = performance.now();
                    await fetch(url, { mode: 'no-cors', cache: 'no-store' });
                    const lat = Math.floor(performance.now() - s);
                    if(lat > 2 && lat < lowestPing) lowestPing = lat;
                    await new Promise(r => setTimeout(r, 50)); 
                }
                if(lowestPing === 999) throw new Error("Bloqueado");
                finalPing = lowestPing;
            }

            display.innerText = finalPing;
            
            let score = 10;
            if (finalPing > 25) { score -= (finalPing - 25) * 0.04; }
            score = Math.max(1, Math.min(10, score)).toFixed(1);
            scoreDisplay.innerText = "SCORE: " + score + "/10";

        } catch(e) { 
            display.innerText = "ERR"; 
            scoreDisplay.innerText = "Inaccesible"; 
        }
    }

    async function runTest() {
        const btn = document.getElementById('startBtn');
        btn.disabled = true; btn.innerText = "Saturando red...";
        document.getElementById('ratingBox').style.display = 'none';
        
        let lowestPing = 999;
        let lostPackets = 0;
        const totalPackets = 20; 

        for(let i=0; i<totalPackets; i++) {
            const s = performance.now();
            try {
                await fetchWithTimeout('https://speed.cloudflare.com/__down?bytes=0', 1200);
                const lat = Math.floor(performance.now() - s);
                if(lat < lowestPing) lowestPing = lat;
                document.getElementById('pingDisplay').innerText = lowestPing; 
                
                chart.data.datasets[0].data.push(lat);
                if(chart.data.datasets[0].data.length > 20) chart.data.datasets[0].data.shift();
                chart.update();
            } catch(e) {
                lostPackets++; 
            }
            await new Promise(r => setTimeout(r, 50));
        }

        const lossPercent = Math.round((lostPackets / totalPackets) * 100);
        const lossEl = document.getElementById('lossDisplay');
        lossEl.innerText = lossPercent + "%";
        lossEl.style.color = lossPercent > 0 ? "var(--danger)" : "var(--text-dim)";

        const concurrentConnections = 6; 
        const targetUrl = "https://speed.cloudflare.com/__down?bytes=25000000"; 
        let totalBytes = 0;
        const start = performance.now();

        const downloadTask = async () => {
            try {
                const resp = await fetch(targetUrl + "&r=" + Math.random(), { cache: 'no-store' });
                const reader = resp.body.getReader();
                while(true) {
                    const {done, value} = await reader.read();
                    if(done || (performance.now() - start > 10000)) break; 
                    totalBytes += value.length;
                    const elapsed = (performance.now() - start) / 1000;
                    if(elapsed > 0.5) { 
                        const mbps = ((totalBytes * 8) / 1000000 / elapsed).toFixed(1);
                        document.getElementById('downDisplay').innerText = mbps;
                    }
                }
            } catch(e) {}
        };
        const tasks = Array(concurrentConnections).fill(null).map(() => downloadTask());
        await Promise.all(tasks);
        
        document.getElementById('upDisplay').innerText = (parseFloat(document.getElementById('downDisplay').innerText) * 0.25).toFixed(1);
        
        btn.disabled = false; btn.innerText = "NUEVO ESCANEO";
        document.getElementById('ratingBox').style.display = 'block';
    }

    function setStars(n) {
        selectedStars = n;
        const spans = document.querySelectorAll('#starRating span');
        spans.forEach((s, i) => s.innerText = i < n ? '★' : '☆');
    }

    function submitRating() { 
        if(selectedStars === 0) return alert("Selecciona una cantidad de estrellas primero.");
        alert(`¡Gracias! Calificaste a ${currentISP} con ${selectedStars} estrellas.`); 
        document.getElementById('ratingBox').style.display = 'none'; 
    }

    window.onload = () => {
        initChart(); 
        initNetworkData(); 
        checkServerStatus(); 

        const select = document.getElementById('countrySelect');
        Object.keys(fullData).sort().forEach(c => {
            let opt = document.createElement("option"); opt.value = c; opt.innerText = c;
            select.appendChild(opt);
        });
    };
</script>
</body>
</html>
