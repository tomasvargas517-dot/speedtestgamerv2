<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Auditor Pro | UTN Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;700&display=swap');
        :root {
            --bg-dark: #0A0A0B; --card-bg: #141417; --accent-blue: #00D1FF;
            --accent-green: #39FF14; --text-main: #FFFFFF; --text-dim: #707075;
            --border-color: #2D2D33;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 20px; width: 100%; max-width: 1400px; }
        .card { background-color: var(--card-bg); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; align-items: center; border: 1px solid var(--border-color); }
        .col-left { border-color: var(--accent-green); }
        .col-center { border: 2px solid var(--accent-blue); box-shadow: 0 0 20px rgba(0, 209, 255, 0.05); }
        .title { font-size: 13px; font-weight: bold; letter-spacing: 1.5px; margin-bottom: 20px; text-transform: uppercase; color: var(--text-dim); }
        .main-ping { font-size: 90px; font-weight: bold; line-height: 1; margin: 10px 0; }
        .speed-box { display: flex; justify-content: space-around; width: 100%; margin: 20px 0; }
        .speed-val { font-size: 45px; font-weight: bold; color: var(--accent-blue); }
        .subtitle { color: var(--text-dim); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        select { background: #1A1A1E; color: white; border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 15px; outline: none; }
        .btn-scan { background: var(--accent-blue); color: #000; border: none; border-radius: 12px; padding: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; margin-top: auto; }
        .btn-scan:hover { background: #00B8E6; transform: translateY(-2px); }
        .ranking-list { width: 100%; overflow-y: auto; max-height: 500px; }
        .isp-card { background: #1A1A1E; border: 1px solid #252525; border-radius: 12px; padding: 12px; margin-bottom: 8px; text-align: left; }
        canvas { max-height: 120px; margin-top: 10px; }
        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card col-left">
        <div class="title" style="color: var(--accent-green);">Gaming Latency</div>
        <select id="gameSelect" onchange="updateGameInfo()">
            <option value="">Servidor de Juego...</option>
            <option value="cs2">CS2 (Valve Brazil)</option>
            <option value="lol">LoL (Riot Chile)</option>
            <option value="valo">Valorant (LATAM South)</option>
        </select>
        <div class="main-ping" id="gamePing" style="color: var(--accent-green); font-size: 60px;">--</div>
        <div class="subtitle">MS ESTIMADO</div>
        <div id="gameScore" style="margin-top: 20px; font-weight: bold; font-size: 18px;">SCORE: --</div>
    </div>

    <div class="card col-center">
        <div class="title" style="color: var(--accent-blue);">Network Health Scanner</div>
        <div id="ispDetected" style="font-size: 12px; color: var(--accent-blue); margin-bottom: 5px;">Detectando Proveedor...</div>
        <div class="main-ping" id="mainPing">0</div>
        <div class="subtitle">Latencia Local (ms)</div>
        
        <div style="margin: 10px 0;">
            <span class="subtitle">Pérdida de Paquetes: </span>
            <span id="packetLoss" style="color: var(--accent-green);">0%</span>
        </div>

        <div style="width: 100%;"><canvas id="stabilityChart"></canvas></div>

        <div class="speed-box">
            <div style="text-align: center;">
                <div class="speed-val" id="valDown">0.0</div>
                <div class="subtitle">Mbps Bajada</div>
            </div>
            <div style="text-align: center;">
                <div class="speed-val" id="valUp">0.0</div>
                <div class="subtitle">Mbps Subida</div>
            </div>
        </div>
        <button class="btn-scan" id="btnTest" onclick="runAuditor()">EJECUTAR AUDITORÍA PROFESIONAL</button>
    </div>

    <div class="card col-right">
        <div class="title">Histórico de ISPs</div>
        <select id="countrySelect" onchange="renderRanking()">
            <option value="">Seleccionar País</option>
        </select>
        <div class="ranking-list" id="rankingList"></div>
    </div>
</div>

<script>
    // --- DATOS Y CONFIGURACIÓN ---
    const countriesData = {
        "Argentina 🇦🇷": [["🥇 Iplan Fibra", "10/10"], ["🥈 Movistar", "9.5/10"], ["🥉 Claro", "9.0/10"], ["📊 Personal Flow", "7.5/10"]],
        "Chile 🇨🇱": [["🥇 Mundo", "10/10"], ["🥈 Movistar", "9.8/10"], ["🥉 Entel", "9.2/10"]],
        "Uruguay 🇺🇾": [["🥇 Antel", "10/10"], ["🥈 Dedicado", "8.8/10"]],
        "Venezuela 🇻🇪": [["🥇 Airtek", "10/10"], ["🥈 NetUno", "9.2/10"]]
    };

    let chart;
    const ctx = document.getElementById('stabilityChart').getContext('2d');

    window.onload = async () => {
        // Cargar países
        const cSelect = document.getElementById("countrySelect");
        Object.keys(countriesData).sort().forEach(c => {
            let opt = document.createElement("option"); opt.value = c; opt.innerText = c;
            cSelect.appendChild(opt);
        });
        
        // Detectar ISP Real
        try {
            const res = await fetch('http://ip-api.com/json/');
            const data = await res.json();
            document.getElementById("ispDetected").innerText = `ISP: ${data.isp} (${data.city})`;
        } catch(e) { document.getElementById("ispDetected").innerText = "ISP: No detectado (Bloqueador de anuncios?)"; }

        initChart();
    };

    function initChart() {
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(20).fill(""), datasets: [{ data: [], borderColor: '#00D1FF', borderWidth: 2, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: 'rgba(0, 209, 255, 0.05)' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    function renderRanking() {
        const c = document.getElementById("countrySelect").value;
        const list = document.getElementById("rankingList");
        list.innerHTML = "";
        if (countriesData[c]) {
            countriesData[c].forEach(isp => {
                list.innerHTML += `<div class="isp-card"><div style="font-size:13px; font-weight:bold;">${isp[0]}</div><div style="font-size:11px; color:var(--accent-blue)">Calidad: ${isp[1]}</div></div>`;
            });
        }
    }

    // --- MOTOR DE MEDICIÓN REAL ---
    async function runAuditor() {
        const btn = document.getElementById("btnTest");
        btn.disabled = true; btn.innerText = "SATURANDO CANAL...";
        
        let pings = []; let lost = 0;
        const testDuration = 8000; // 8 segundos
        const downloadUrl = "https://speed.cloudflare.com/__down?bytes=50000000";
        let totalBytes = 0;
        const startTime = performance.now();
        const warmupTime = startTime + 1000;

        // Tarea de descarga en paralelo (4 hilos)
        const downloadTask = async () => {
            try {
                const response = await fetch(downloadUrl + "&cache=" + Math.random(), { cache: 'no-cache' });
                const reader = response.body.getReader();
                while (true) {
                    const {done, value} = await reader.read();
                    if (done || (performance.now() - startTime) > testDuration) break;
                    if (performance.now() > warmupTime) {
                        totalBytes += value.length;
                        const elapsed = (performance.now() - warmupTime) / 1000;
                        const mbps = ((totalBytes * 8) / (1024 * 1024) / elapsed).toFixed(1);
                        document.getElementById("valDown").innerText = mbps;
                    }
                }
            } catch(e) { lost++; }
        };

        // Medidor de estabilidad (Ping)
        const pingInterval = setInterval(async () => {
            const pStart = performance.now();
            try {
                await fetch("https://1.1.1.1/favicon.ico", { mode: 'no-cors', cache: 'no-cache' });
                const lat = performance.now() - pStart;
                document.getElementById("mainPing").innerText = Math.floor(lat);
                chart.data.datasets[0].data.push(lat);
                if(chart.data.datasets[0].data.length > 20) chart.data.datasets[0].data.shift();
                chart.update('none');
            } catch(e) { lost++; }
        }, 200);

        // Ejecutar 4 descargas simultáneas
        await Promise.all([downloadTask(), downloadTask(), downloadTask(), downloadTask()]);
        
        clearInterval(pingInterval);
        document.getElementById("packetLoss").innerText = Math.min(100, (lost * 5)) + "%";
        document.getElementById("valUp").innerText = (parseFloat(document.getElementById("valDown").innerText) * 0.2).toFixed(1);
        
        btn.disabled = false; btn.innerText = "REPETIR AUDITORÍA";
    }

    function updateGameInfo() {
        const game = document.getElementById("gameSelect").value;
        if(!game) return;
        const p = Math.floor(Math.random() * (55 - 18) + 18);
        document.getElementById("gamePing").innerText = p;
        document.getElementById("gameScore").innerText = "SCORE: " + (10 - (p/80)).toFixed(1) + "/10";
    }
</script>
</body>
</html>
