<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Auditor Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0A0A0B; --card: #141417; --blue: #00D1FF;
            --green: #39FF14; --text: #FFFFFF; --dim: #707075; --border: #2D2D33;
        }
        
        * { box-sizing: border-box; }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; /* Corta cualquier intento de estirarse hacia abajo */
            display: flex; 
            justify-content: center; 
            align-items: center;
        }
        
        .container { 
            display: grid; 
            grid-template-columns: 1fr 1.5fr 1fr; 
            gap: 20px; 
            width: 100%; 
            max-width: 1400px;
            height: 90vh; /* Altura máxima bloqueada */
            padding: 20px;
        }

        .card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid var(--border); 
            display: flex; 
            flex-direction: column;
            height: 100%; 
            overflow: hidden; 
        }

        .col-center { border: 2px solid var(--blue); box-shadow: 0 0 15px rgba(0, 209, 255, 0.1); justify-content: space-between; }
        
        .title { font-size: 11px; font-weight: bold; letter-spacing: 2px; color: var(--dim); margin-bottom: 15px; text-transform: uppercase; text-align: center; flex-shrink: 0; }
        .main-val { font-size: 60px; font-weight: bold; line-height: 1; margin: 5px 0; text-align: center; flex-shrink: 0; }
        
        /* PARCHE DEFINITIVO PARA CHART.JS */
        .chart-box {
            position: relative;
            height: 120px; /* Altura fija inamovible */
            width: 100%;
            flex-shrink: 0;
            margin: 10px 0;
        }
        canvas {
            position: absolute; /* Saca al gráfico del flujo, evita el bucle de estiramiento */
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }

        .speed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; flex-shrink: 0; }
        .speed-item { text-align: center; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; border: 1px solid #222; }
        .speed-num { font-size: 24px; font-weight: bold; color: var(--blue); }
        .label { font-size: 9px; color: var(--dim); font-weight: bold; text-transform: uppercase; text-align: center; flex-shrink: 0; }
        
        select, input { background: #1A1A1E; color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; flex-shrink: 0; }
        
        .btn { background: var(--blue); color: black; border: none; border-radius: 10px; padding: 15px; font-weight: bold; width: 100%; cursor: pointer; flex-shrink: 0; }
        
        /* Contenedor del Ranking */
        .ranking-list { 
            overflow-y: auto; 
            flex-grow: 1; 
            height: 0; /* Truco de Flexbox para forzar el scroll interno y no estirar la tarjeta */
            padding-right: 5px; 
        }
        .ranking-list::-webkit-scrollbar { width: 5px; }
        .ranking-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .ranking-item { background: #1A1A1E; padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--blue); }

        .rating-box { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); flex-shrink: 0; display: none; }
        .stars-input { color: #FFD700; font-size: 20px; cursor: pointer; display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }

        @media (max-width: 1000px) { 
            body { overflow: auto; height: auto; display: block; }
            .container { grid-template-columns: 1fr; height: auto; } 
            .card { min-height: 600px; height: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="border-color: var(--green);">
        <div class="title" style="color: var(--green);">Gaming Latency</div>
        <select id="gameSelect" onchange="testGame()">
            <option value="">Servidor...</option>
            <option value="35">Counter-Strike 2</option>
            <option value="60">League of Legends</option>
            <option value="25">Valorant</option>
            <option value="80">Rust (Oficial)</option>
            <option value="15">Minecraft Local</option>
        </select>
        <div class="main-val" id="gameDisplay" style="color: var(--green);">--</div>
        <div class="label">MS ESTIMADO</div>
        <div id="gameScore" style="margin-top: 20px; font-weight: bold; text-align: center; color: var(--dim);">SCORE: --</div>
    </div>

    <div class="card col-center">
        <div class="title">Network Health</div>
        <div id="ispLabel" style="font-size: 11px; color: var(--blue); margin-bottom: 5px; text-align: center;">Detectando ISP...</div>
        <div class="main-val" id="pingDisplay">0</div>
        <div class="label">PING LOCAL (MS)</div>
        
        <div class="chart-box">
            <canvas id="chart"></canvas>
        </div>

        <div class="speed-grid">
            <div class="speed-item"><div class="speed-num" id="downDisplay">0.0</div><div class="label">DOWN</div></div>
            <div class="speed-item"><div class="speed-num" id="upDisplay">0.0</div><div class="label">UP</div></div>
        </div>

        <button class="btn" id="startBtn" onclick="runTest()">INICIAR ESCANEO</button>

        <div id="ratingBox" class="rating-box">
            <div class="stars-input" id="starRating">
                <span onclick="setStars(1)">☆</span><span onclick="setStars(2)">☆</span><span onclick="setStars(3)">☆</span><span onclick="setStars(4)">☆</span><span onclick="setStars(5)">☆</span>
            </div>
            <button class="btn" style="background: var(--green); padding: 8px; font-size: 11px;" onclick="submitRating()">SUBIR FEEDBACK</button>
        </div>
    </div>

    <div class="card">
        <div class="title">Ranking Latam</div>
        <select id="countrySelect" onchange="showRanking()">
            <option value="">País...</option>
        </select>
        <div class="ranking-list" id="rankingList"></div>
    </div>
</div>

<script>
    const fullData = {
        "Argentina 🇦🇷": [["Iplan Fibra", "10/10", "⭐⭐⭐⭐⭐"], ["Movistar", "9.2", "⭐⭐⭐⭐"], ["Claro", "8.5", "⭐⭐⭐⭐"], ["Personal", "7.0", "⭐⭐⭐"]],
        "Bolivia 🇧🇴": [["AXS", "9.0", "⭐⭐⭐⭐"], ["Entel", "8.5", "⭐⭐⭐⭐"]],
        "Brasil 🇧🇷": [["Vivo Fibra", "10/10", "⭐⭐⭐⭐⭐"], ["Oi Fibra", "9.5", "⭐⭐⭐⭐"]],
        "Chile 🇨🇱": [["Mundo", "10/10", "⭐⭐⭐⭐⭐"], ["Movistar", "9.8", "⭐⭐⭐⭐⭐"], ["Entel", "9.0", "⭐⭐⭐⭐"]],
        "Colombia 🇨🇴": [["ETB Fibra", "9.5", "⭐⭐⭐⭐⭐"], ["Movistar", "9.0", "⭐⭐⭐⭐"]],
        "Ecuador 🇪🇨": [["Netlife", "10/10", "⭐⭐⭐⭐⭐"], ["Puntonet", "9.2", "⭐⭐⭐⭐"]],
        "México 🇲🇽": [["Totalplay", "9.8", "⭐⭐⭐⭐⭐"], ["Telmex Fibra", "9.0", "⭐⭐⭐⭐"]],
        "Paraguay 🇵🇾": [["Tigo", "9.0", "⭐⭐⭐⭐"], ["Personal", "8.8", "⭐⭐⭐⭐"]],
        "Perú 🇵🇪": [["Win", "10/10", "⭐⭐⭐⭐⭐"], ["Nubyx", "9.5", "⭐⭐⭐⭐⭐"]],
        "Uruguay 🇺🇾": [["Antel", "10/10", "⭐⭐⭐⭐⭐"], ["Dedicado", "8.5", "⭐⭐⭐⭐"]],
        "Venezuela 🇻🇪": [["Airtek", "10/10", "⭐⭐⭐⭐⭐"], ["NetUno", "9.0", "⭐⭐⭐⭐"]]
    };

    let chart;
    let selectedStars = 0;

    function initChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(15).fill(''), datasets: [{ data: [], borderColor: '#00D1FF', tension: 0.4, borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(0,209,255,0.05)' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
        });
    }

    async function detectISP() {
        try {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            document.getElementById('ispLabel').innerText = d.org || "ISP Detectado";
        } catch(e) { document.getElementById('ispLabel').innerText = "ISP: Online"; }
    }

    function showRanking() {
        const c = document.getElementById('countrySelect').value;
        const container = document.getElementById('rankingList');
        container.innerHTML = "";
        if(fullData[c]) {
            fullData[c].forEach(isp => {
                container.innerHTML += `<div class="ranking-item">
                    <div style="font-weight:bold; font-size:13px;">${isp[0]}</div>
                    <div style="color:var(--blue); font-size:10px;">Score: ${isp[1]}</div>
                    <div style="color:#FFD700; font-size:11px;">${isp[2]}</div>
                </div>`;
            });
        }
    }

async function runTest() {
        const btn = document.getElementById('startBtn');
        btn.disabled = true; btn.innerText = "ESCANEO...";
        
        // Ping Loop (10 muestras)
        for(let i=0; i<10; i++) {
            const s = performance.now();
            try {
                await fetch('https://1.1.1.1/favicon.ico', { mode: 'no-cors', cache: 'no-cache' });
                const lat = Math.floor(performance.now() - s);
                document.getElementById('pingDisplay').innerText = lat;
                chart.data.datasets[0].data.push(lat);
                if(chart.data.datasets[0].data.length > 15) chart.data.datasets[0].data.shift();
                chart.update();
            } catch(e) {}
            await new Promise(r => setTimeout(r, 100));
        }

        // Test de Bajada Extendida (100MB y 12 segundos)
        const start = performance.now();
        try {
            // Aumentamos el payload a 100MB para que no termine rápido
            const resp = await fetch("https://speed.cloudflare.com/__down?bytes=100000000", { cache: 'no-cache' });
            const reader = resp.body.getReader();
            let bytes = 0;
            while(true) {
                const {done, value} = await reader.read();
                // Aumentamos el límite de corte a 12000 ms (12 segundos)
                if(done || (performance.now() - start > 12000)) break;
                bytes += value.length;
                const mbps = ((bytes * 8) / (1024 * 1024) / ((performance.now() - start) / 1000)).toFixed(1);
                document.getElementById('downDisplay').innerText = mbps;
            }
            // Estimación de subida
            document.getElementById('upDisplay').innerText = (parseFloat(document.getElementById('downDisplay').innerText) * 0.2).toFixed(1);
        } catch(e) {}

        btn.disabled = false; btn.innerText = "REPETIR";
        document.getElementById('ratingBox').style.display = 'block';
    }

    function testGame() {
        const val = parseInt(document.getElementById('gameSelect').value);
        if(!val) return;
        const p = val + Math.floor(Math.random() * 10);
        document.getElementById('gameDisplay').innerText = p + "ms";
        document.getElementById('gameScore').innerText = "SCORE: " + (10 - (p/100)).toFixed(1);
    }

    function setStars(n) {
        selectedStars = n;
        const spans = document.querySelectorAll('#starRating span');
        spans.forEach((s, i) => s.innerText = i < n ? '★' : '☆');
    }

    function submitRating() { 
        alert("¡Enviado!"); 
        document.getElementById('ratingBox').style.display = 'none'; 
    }

    window.onload = () => {
        initChart(); detectISP();
        const select = document.getElementById('countrySelect');
        Object.keys(fullData).sort().forEach(c => {
            let opt = document.createElement("option"); opt.value = c; opt.innerText = c;
            select.appendChild(opt);
        });
    };
</script>
</body>
</html>
